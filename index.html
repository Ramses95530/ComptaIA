<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ComptaIA — Gestion Comptable</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💼</text></svg>">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>









/* ── RESET & BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080f1c;--bg2:#0f1a2e;--bg3:#172338;--bg4:#1f2f48;--bg5:#273a58;
  --gold:#c9a84c;--gold2:#e8c96a;
  --tx:#e8eef8;--tx2:#7a90b8;--tx3:#4a6080;
  --green:#4ade80;--blue:#60a5fa;--purple:#c084fc;
  --amber:#f59e0b;--red:#f87171;--orange:#fb923c;--teal:#2dd4bf;
  --r:10px;--r2:6px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
/* ── LAYOUT ── */
#root{height:100vh;display:flex;flex-direction:column}
.app{display:flex;height:100vh;overflow:hidden}
/* ── SPLASH ── */
.splash{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
.splash h1{font-size:36px;font-weight:800;color:var(--gold);letter-spacing:-1px}
.splash p{color:var(--tx2);font-size:14px}
.splash-bar{width:200px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px}
.splash-fill{height:100%;background:var(--gold);border-radius:2px;animation:fillBar 1.5s ease forwards}
@keyframes fillBar{from{width:0}to{width:100%}}
/* ── SIDEBAR ── */
.sb{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid rgba(201,168,76,.1);display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:18px 14px 14px;border-bottom:1px solid rgba(201,168,76,.08)}
.sb-logo{font-size:22px;font-weight:800;color:var(--gold);letter-spacing:-0.5px;line-height:1}
.sb-ver{font-size:10px;color:var(--tx3);margin-top:2px;letter-spacing:1px}
.sb-co{margin:8px;background:var(--bg3);border-radius:var(--r2);padding:9px 11px;cursor:pointer;border:1px solid rgba(255,255,255,.05);transition:.15s}
.sb-co:hover{border-color:rgba(201,168,76,.3)}
.sb-co-name{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-co-sub{font-size:10px;color:var(--tx2);margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:6px;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}
.ng{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--tx3);padding:10px 8px 4px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--r2);cursor:pointer;font-size:12px;font-weight:500;color:var(--tx2);transition:.12s;margin-bottom:1px;user-select:none}
.ni:hover{background:var(--bg3);color:var(--tx)}
.ni.active{background:rgba(201,168,76,.1);color:var(--gold)}
.ni-icon{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.ni-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{margin-left:auto;background:var(--bg4);font-size:10px;padding:1px 5px;border-radius:8px;color:var(--tx3);min-width:18px;text-align:center;flex-shrink:0}
.ni.active .badge{background:rgba(201,168,76,.18);color:var(--gold)}
.badge-red{background:rgba(248,113,113,.15)!important;color:var(--red)!important}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sync-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx3);padding:4px 8px;border-radius:12px;background:var(--bg3);white-space:nowrap}
.sync-pill.ok{color:var(--green);background:rgba(74,222,128,.08)}
.sync-pill.err{color:var(--red);background:rgba(248,113,113,.08)}
.content{flex:1;overflow-y:auto;padding:18px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r2);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:.12s;font-family:inherit;white-space:nowrap;user-select:none}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-gold{background:var(--gold);color:#080f1c}.btn-gold:hover{background:var(--gold2)}
.btn-ghost{background:var(--bg3);color:var(--tx);border:1px solid rgba(255,255,255,.07)}.btn-ghost:hover{background:var(--bg4)}
.btn-danger{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.18)}.btn-danger:hover{background:rgba(248,113,113,.2)}
.btn-outline{background:none;color:var(--tx2);border:1px solid rgba(255,255,255,.09)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-xs{padding:3px 7px;font-size:10px}
/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
@media(max-width:1200px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg2);border-radius:var(--r);padding:14px 16px;border:1px solid rgba(255,255,255,.04);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--gold))}
.stat-lbl{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.stat-val{font-size:20px;font-weight:800;line-height:1.1}
.stat-sub{font-size:11px;color:var(--tx2);margin-top:3px}
/* ── TABLE ── */
.tbl-wrap{background:var(--bg2);border-radius:var(--r);border:1px solid rgba(255,255,255,.04);overflow:hidden;margin-bottom:16px}
.tbl-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);flex-wrap:wrap;gap:8px}
.tbl-hd h3{font-size:13px;font-weight:600}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
th{text-align:left;padding:7px 12px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);background:rgba(0,0,0,.15);border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap}
td{padding:8px 12px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02);cursor:pointer}
tbody tr.no-hover:hover td{background:none;cursor:default}
.mono{font-variant-numeric:tabular-nums;font-weight:500}
/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.tag.client{background:rgba(74,222,128,.1);color:var(--green)}
.tag.fournisseur{background:rgba(96,165,250,.1);color:var(--blue)}
.tag.charges_sociales{background:rgba(251,146,60,.1);color:var(--orange)}
.tag.divers{background:rgba(245,158,11,.1);color:var(--amber)}
.tag.releve{background:rgba(192,132,252,.1);color:var(--purple)}
.tag.fraud-high{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.22)}
.tag.fraud-medium{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.18)}
.tag.fraud-low{background:rgba(96,165,250,.08);color:var(--blue);border:1px solid rgba(96,165,250,.13)}
/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-start;justify-content:center;z-index:500;padding:16px;overflow-y:auto;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border-radius:14px;border:1px solid rgba(201,168,76,.16);width:100%;max-width:640px;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.7);animation:slideUp .18s;margin:auto}
.modal.wide{max-width:860px}
.modal.narrow{max-width:460px}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0}
.modal-hd h3{font-size:16px;font-weight:700}
.modal-bd{padding:18px 20px;overflow-y:auto;max-height:70vh}
.modal-ft{padding:12px 20px;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;flex-wrap:wrap}
.close-btn{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:18px;line-height:1;padding:4px;border-radius:4px;transition:.12s}
.close-btn:hover{color:var(--tx);background:var(--bg4)}
/* ── FORMS ── */
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:10px;font-weight:700;letter-spacing:.4px;color:var(--tx2);text-transform:uppercase}
.fg input,.fg select,.fg textarea{background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--r2);padding:8px 10px;font-size:13px;color:var(--tx);font-family:inherit;outline:none;transition:.15s;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);background:var(--bg4)}
.fg input::placeholder{color:var(--tx3)}
.fg select option{background:var(--bg3);color:var(--tx)}
.fg textarea{resize:vertical;min-height:60px}
.fg input.err,.fg select.err{border-color:var(--red)}
.err-msg{font-size:10px;color:var(--red);margin-top:2px}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-2 .full{grid-column:1/-1}
/* ── ALERTS ── */
.alert{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:var(--r2);font-size:12px;margin-bottom:10px}
.alert.high{background:rgba(248,113,113,.09);border:1px solid rgba(248,113,113,.18);color:var(--red)}
.alert.medium{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.16);color:var(--amber)}
.alert.low{background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.13);color:var(--blue)}
.alert.info{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.15);color:var(--gold)}
.alert.success{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.15);color:var(--green)}
/* ── UPLOAD ── */
.drop-zone{border:2px dashed rgba(201,168,76,.22);border-radius:var(--r);padding:32px;text-align:center;cursor:pointer;transition:.18s;background:rgba(201,168,76,.02);margin-bottom:14px}
.drop-zone:hover,.drop-zone.drag{border-color:var(--gold);background:rgba(201,168,76,.06)}
.dz-icon{font-size:32px;margin-bottom:8px}
.dz-title{font-size:14px;font-weight:600;margin-bottom:4px}
.dz-sub{font-size:12px;color:var(--tx2);line-height:1.5}
/* ── FILTERS ── */
.search-row{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid rgba(255,255,255,.06);border-radius:var(--r2);padding:6px 10px;margin-bottom:10px}
.search-row input{background:none;border:none;flex:1;outline:none;font-size:13px;color:var(--tx);font-family:inherit;min-width:0}
.search-row input::placeholder{color:var(--tx3)}
.filter-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;align-items:center}
.ftab{padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.07);background:none;color:var(--tx2);font-family:inherit;transition:.12s;user-select:none}
.ftab:hover{color:var(--tx);border-color:rgba(255,255,255,.18)}
.ftab.active{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3);color:var(--gold)}
.adv-filter{background:var(--bg3);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;border:1px solid rgba(255,255,255,.05)}
.adv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
/* ── MISC ── */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--tx2)}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.5}
.empty p{font-size:13px}
.chart-box{background:var(--bg2);border-radius:var(--r);padding:14px 16px;border:1px solid rgba(255,255,255,.04);margin-bottom:14px}
.chart-box h3{font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:12px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}}
.dr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;gap:12px}
.dr:last-child{border-bottom:none}
.dl{color:var(--tx2);flex-shrink:0}
.dv{font-weight:500;text-align:right}
.tva-box{background:var(--bg2);border-radius:var(--r);padding:14px 16px;border:1px solid rgba(255,255,255,.04)}
.tva-boxes{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
@media(max-width:800px){.tva-boxes{grid-template-columns:1fr}}
.tva-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.tva-row:last-child{border-bottom:none;font-weight:700;padding-top:8px}
.tva-box h4{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.reminder-card{background:var(--bg3);border-radius:var(--r2);padding:11px 13px;border:1px solid rgba(245,158,11,.18);margin-bottom:8px;display:flex;align-items:center;gap:10px;font-size:12px}
.report-banner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:10px 14px;border-radius:var(--r2);background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15);margin-bottom:14px;font-size:12px}
.img-prev{width:100%;max-height:200px;object-fit:contain;border-radius:var(--r2);background:var(--bg3);margin-bottom:12px}
/* ── COMPANY SELECT ── */
.cs-wrap{position:fixed;inset:0;background:var(--bg);z-index:800;display:flex;align-items:center;justify-content:center;padding:16px}
.cs-box{background:var(--bg2);border-radius:16px;border:1px solid rgba(201,168,76,.18);padding:32px;max-width:480px;width:100%;text-align:center;box-shadow:0 32px 100px rgba(0,0,0,.8)}
.cs-logo{font-size:40px;font-weight:800;color:var(--gold);margin-bottom:4px}
.cs-sub{color:var(--tx2);font-size:13px;margin-bottom:24px}
.co-list{display:flex;flex-direction:column;gap:7px;margin-bottom:18px;max-height:300px;overflow-y:auto;scrollbar-width:thin}
.co-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg3);border-radius:var(--r);cursor:pointer;border:1px solid rgba(255,255,255,.05);transition:.15s;text-align:left}
.co-item:hover{border-color:rgba(201,168,76,.3);background:var(--bg4)}
.co-item-icon{width:34px;height:34px;border-radius:8px;background:rgba(201,168,76,.1);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.co-item-name{font-weight:600;font-size:13px}
.co-item-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.co-new-row{display:flex;gap:8px}
.co-new-row input{flex:1;background:var(--bg3);border:1px solid rgba(255,255,255,.09);border-radius:var(--r2);padding:9px 12px;font-size:13px;color:var(--tx);font-family:inherit;outline:none;transition:.15s}
.co-new-row input:focus{border-color:var(--gold)}
.co-new-row input::placeholder{color:var(--tx3)}
/* ── NOTIFICATION TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;z-index:900;background:var(--bg3);border:1px solid rgba(201,168,76,.2);border-radius:var(--r2);padding:10px 16px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideUp .2s;max-width:320px}
/* ── SETTINGS ── */
.setting-block{background:var(--bg2);border-radius:var(--r);border:1px solid rgba(255,255,255,.04);margin-bottom:14px;overflow:hidden}
.setting-hd{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;font-weight:600}
.setting-bd{padding:16px}
.setting-hint{font-size:12px;color:var(--tx2);line-height:1.6;margin-bottom:12px;background:var(--bg3);padding:10px 12px;border-radius:var(--r2);border-left:3px solid var(--gold)}
.api-status{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r2);font-size:12px;margin-bottom:10px}
.api-status.ok{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.15);color:var(--green)}
.api-status.none{background:var(--bg3);border:1px solid rgba(255,255,255,.06);color:var(--tx2)}
.api-status.err{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.15);color:var(--red)}
/* ── IMPORT CARDS ── */
.import-card{background:var(--bg2);border-radius:var(--r);border:1px solid rgba(255,255,255,.05);overflow:hidden;margin-bottom:10px}
.import-card-hd{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,0,0,.12);border-bottom:1px solid rgba(255,255,255,.04)}
.import-card-body{display:flex}
.import-card-preview{width:90px;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,.04)}
.import-card-preview img{width:90px;height:90px;object-fit:cover}
.import-card-preview .pdf-icon{font-size:28px;opacity:.5}
.import-card-info{flex:1;padding:10px 14px;min-width:0}
.import-card-actions{display:flex;flex-direction:column;gap:5px;padding:10px 12px;border-left:1px solid rgba(255,255,255,.04);justify-content:center;min-width:100px}
/* ── AMORT ── */
.amort-mini{padding-left:28px;background:rgba(0,0,0,.08);font-size:11px;color:var(--tx2)}



/* Pagination */
.pg-wrap{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 16px;border-top:1px solid rgba(255,255,255,.04);flex-wrap:wrap}
/* File storage indicator */
.file-stored{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--blue);padding:2px 6px;background:rgba(96,165,250,.08);border-radius:10px;margin-top:4px}








</style>

<script>
(function() {
  var hash = window.location.hash;
  if (!hash) return;
  var params = new URLSearchParams(hash.slice(1));
  var token = params.get("access_token");
  var state = params.get("state");
  if (!token || state !== "comptaia_dbx_oauth") return;
  window.history.replaceState({}, "", window.location.pathname);
  localStorage.setItem("comptaia_dbx", JSON.stringify(token));
  document.getElementById("root").innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#080f1c;color:#e8eef8;font-family:sans-serif;flex-direction:column;gap:16px;text-align:center;padding:20px"><div style="font-size:50px">✅</div><div style="font-size:22px;color:#c9a84c;font-weight:700">Dropbox connecté !</div><div style="font-size:13px;color:#7a90b8">Synchronisation active.</div><button onclick="location.reload()" style="margin-top:12px;padding:12px 28px;background:#c9a84c;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;color:#080f1c">🚀 Ouvrir ComptaIA</button></div>';
})();
</script>
<script>
window.onerror = function(msg,src,line,col,err) {

// ════════════════════════════════════════════════════════════
//  FRAUD DETECTION — 8 rules
// ════════════════════════════════════════════════════════════
const detectFraud = (entry, all) => {
  const flags = [],
    others = (all || []).filter(e => e.id !== entry.id);
  if (!entry) return flags;

  // 1. Duplicate invoice
  const dupes = others.filter(e => e.categorie === entry.categorie && e.tiers && entry.tiers && e.tiers.toLowerCase() === entry.tiers.toLowerCase() && Math.abs(num(e.ttc) - num(entry.ttc)) < Math.max(num(entry.ttc) * 0.03, 0.1) && entry.date && e.date && Math.abs(new Date(e.date) - new Date(entry.date)) < 31 * 86400000);
  if (dupes.length) flags.push({
    id: "duplicate",
    label: "Double facture possible",
    severity: "high",
    extra: `Similaire à: ${dupes[0].tiers || dupes[0].numero}`
  });

  // 2. TVA mismatch
  if (num(entry.ht) && num(entry.tva_taux) && num(entry.tva_montant)) {
    const exp = num(entry.ht) * num(entry.tva_taux) / 100;
    if (Math.abs(exp - num(entry.tva_montant)) > 0.06) flags.push({
      id: "tva_mismatch",
      label: "Incohérence TVA détectée",
      severity: "high",
      extra: `Attendu: ${eur(exp)}`
    });
  }

  // 3. Future date
  if (entry.date && new Date(entry.date) > new Date()) flags.push({
    id: "future_date",
    label: "Date dans le futur",
    severity: "high"
  });

  // 4. Missing invoice number
  if (["client", "fournisseur"].includes(entry.categorie) && !entry.numero) flags.push({
    id: "no_num",
    label: "Numéro de pièce manquant",
    severity: "low"
  });

  // 5. Very high amount
  if (num(entry.ttc) > 10000) flags.push({
    id: "high_amount",
    label: "Montant élevé (> 10 000 €)",
    severity: "medium",
    extra: eur(entry.ttc)
  });

  // 6. Abnormal vs tiers average
  const tierOthers = others.filter(e => e.tiers && entry.tiers && e.tiers.toLowerCase() === entry.tiers.toLowerCase() && e.categorie === entry.categorie);
  if (tierOthers.length >= 2) {
    const avg = tierOthers.reduce((s, e) => s + num(e.ttc), 0) / tierOthers.length;
    if (avg > 0 && num(entry.ttc) > avg * 3) flags.push({
      id: "unusual_tiers",
      label: "Montant anormal pour ce tiers",
      severity: "medium",
      extra: `Moy: ${eur(avg)}`
    });
  }

  // 7. Suspiciously round amount
  if (num(entry.ttc) > 500 && num(entry.ttc) % 100 === 0) flags.push({
    id: "round",
    label: "Montant suspicieusement rond",
    severity: "low"
  });

  // 8. Old document
  if (entry.date && new Date(entry.date) < new Date(Date.now() - 365 * 86400000)) flags.push({
    id: "old",
    label: "Document très ancien (> 1 an)",
    severity: "low"
  });

  // 9. AI low confidence
  if (entry.confiance === "basse") flags.push({
    id: "ai_low",
    label: "Confiance IA faible — vérifier",
    severity: "medium"
  });
  return flags;
};
const fraudSev = flags => {
  if (!flags || !flags.length) return null;
  if (flags.some(f => f.severity === "high")) return "high";
  if (flags.some(f => f.severity === "medium")) return "medium";
  return "low";
};

// ════════════════════════════════════════════════════════════
//  AMORTISSEMENT
// ════════════════════════════════════════════════════════════
const calcAmort = ({
  valeur,
  duree,
  methode,
  taux
}) => {
  const v = num(valeur),
    d = Math.max(1, parseInt(duree) || 1),
    t = num(taux);
  const rows = [];
  let vr = v;
  for (let i = 1; i <= d; i++) {
    const dot = methode === "lineaire" ? v / d : vr * (t / 100 || 1 / d);
    const cumul = rows.length ? rows[rows.length - 1].cumul + dot : dot;
    vr = Math.max(0, v - cumul);
    rows.push({
      annee: i,
      dotation: dot,
      cumul,
      vr
    });
  }
  return rows;
};

const getDbxToken = () => lsGet(LS_DBX, "");

  const res = await fetch("https://content.dropboxapi.com/2/files/upload", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/octet-stream",
      "Dropbox-API-Arg": JSON.stringify({
        path: "/ComptaIA/comptaia-data.json",
        mode: "overwrite",
        autorename: false,
        mute: true
      })
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error(`Dropbox ${res.status}: ${t.slice(0, 120)}`);
  }
  return true;
};
const dbxDownload = async () => {
  const token = getDbxToken();
  if (!token) throw new Error("Token Dropbox manquant.");
  const res = await fetch("https://content.dropboxapi.com/2/files/download", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${token}`,
      "Dropbox-API-Arg": JSON.stringify({
        path: "/ComptaIA/comptaia-data.json"
      })
    }
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error(`Dropbox ${res.status}: ${t.slice(0, 120)}`);
  }
  return res.json();
};
const dbxUploadFile = async (file, entryId, date) => {
  const token = getDbxToken();
  if (!token) return null;
  try {
    const year = (date || today()).slice(0, 4);
    const month = (date || today()).slice(5, 7);
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const path = `/ComptaIA/documents/${year}/${month}/${entryId}_${safeName}`;
    const buf = await file.arrayBuffer();
    const res = await fetch("https://content.dropboxapi.com/2/files/upload", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/octet-stream",
        "Dropbox-API-Arg": JSON.stringify({
          path,
          mode: "overwrite",
          autorename: false,
          mute: true
        })
      },
      body: buf
    });
    if (!res.ok) return null;
    return path;
  } catch {
    return null;
  }
};
const dbxGetLink = async path => {
  const token = getDbxToken();
  if (!token || !path) return null;
  try {
    const res = await fetch("https://api.dropboxapi.com/2/files/get_temporary_link", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        path
      })
    });
    if (!res.ok) return null;
    const d = await res.json();
    return d.link || null;
  } catch {
    return null;
  }
};

// ── DROPBOX PKCE CALLBACK HANDLER ──
// Called after Dropbox redirects back with ?code=...
async function handleDropboxCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const state = params.get("state");
  if (!code || state !== "comptaia_dbx_oauth") return false;

  // Clean URL
  window.history.replaceState({}, "", window.location.pathname);
  const appKey = lsGet("comptaia_dbx_appkey", "");
  const verifier = lsGet("comptaia_dbx_verifier", "");
  const redirectUri = window.location.origin + window.location.pathname;
  if (!appKey || !verifier) return false;
  try {
    const res = await fetch("https://api.dropboxapi.com/oauth2/token", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: new URLSearchParams({
        code,
        grant_type: "authorization_code",
        client_id: appKey,
        code_verifier: verifier,
        redirect_uri: redirectUri
      })
    });
    const data = await res.json();
    if (data.access_token) {
      lsSet("comptaia_dbx", data.access_token);
      if (data.refresh_token) lsSet("comptaia_dbx_refresh", data.refresh_token);
      lsDel("comptaia_dbx_verifier");
      return true;
    }
  } catch (e) {
    console.error("PKCE exchange error:", e);
  }
  return false;
}
